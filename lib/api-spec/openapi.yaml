openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: K&S Solar Energy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: bookings
    description: Solar panel washing bookings
  - name: complaints
    description: Customer complaints
  - name: settings
    description: App settings
  - name: chat
    description: Support chat
  - name: users
    description: User management (admin)
  - name: technicians
    description: Technician management (admin)
  - name: quotes
    description: Solar installation quotation requests
  - name: warranties
    description: Customer warranty tracking
  - name: referral
    description: Referral system
  - name: sites
    description: Working sites management (admin)
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: attendance
    description: Technician GPS check-in/check-out attendance
  - name: reports
    description: Technician performance reports and Excel download
  - name: siteVisits
    description: One-time site visit requests assigned to technicians

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user (creates pending account)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account request submitted, pending admin approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error or user already exists

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update own profile (name, phone)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /auth/me/password:
    patch:
      operationId: changeMyPassword
      tags: [auth]
      summary: Change own password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Current password incorrect
        "401":
          description: Unauthorized

  /bookings:
    get:
      operationId: getBookings
      tags: [bookings]
      summary: Get bookings (own bookings or all if admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a washing booking (requires login)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized

  /bookings/{id}:
    get:
      operationId: getBookingById
      tags: [bookings]
      summary: Get booking by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /bookings/stats/summary:
    get:
      operationId: getBookingStats
      tags: [bookings]
      summary: Get booking statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Booking statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingStats"

  /bookings/guest:
    post:
      operationId: createGuestBooking
      tags: [bookings]
      summary: Create a washing booking without an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Invalid request

  /complaints:
    get:
      operationId: getComplaints
      tags: [complaints]
      summary: Get complaints (own or all for admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a complaint
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaintRequest"
      responses:
        "201":
          description: Complaint submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "401":
          description: Unauthorized

  /complaints/guest:
    post:
      operationId: createGuestComplaint
      tags: [complaints]
      summary: Submit a complaint without an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaintRequest"
      responses:
        "201":
          description: Complaint submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Bad request

  /complaints/{id}:
    get:
      operationId: getComplaintById
      tags: [complaints]
      summary: Get complaint by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          description: Forbidden
        "404":
          description: Not found
    patch:
      operationId: updateComplaint
      tags: [complaints]
      summary: Update complaint status and/or technician info (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplaintRequest"
      responses:
        "200":
          description: Complaint updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /complaints/{id}/status:
    patch:
      operationId: updateComplaintStatus
      tags: [complaints]
      summary: Update complaint status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          description: Forbidden

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all app settings
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"

  /settings/{key}:
    patch:
      operationId: updateSetting
      tags: [settings]
      summary: Update a setting value (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingRequest"
      responses:
        "200":
          description: Setting updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Setting"
        "403":
          description: Forbidden

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [users]
      summary: Get all non-admin users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden

  /admin/users/{id}/password:
    patch:
      operationId: adminResetUserPassword
      tags: [users]
      summary: Reset a user's password (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
        "404":
          description: User not found

  /admin/users/{id}:
    delete:
      operationId: deleteAdminUser
      tags: [users]
      summary: Delete a user account (admin only, cannot delete admin accounts)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted successfully
        "400":
          description: Cannot delete admin accounts
        "403":
          description: Forbidden
        "404":
          description: User not found

  /admin/users/{id}/report:
    get:
      operationId: getCustomerReport
      tags: [users]
      summary: Get full activity report for a customer (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer activity report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerReport"
        "403":
          description: Forbidden
        "404":
          description: User not found

  /admin/users/{id}/report/pdf:
    get:
      operationId: downloadCustomerReportPdf
      tags: [users]
      summary: Download customer report as PDF (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden
        "404":
          description: User not found

  /admin/users/{id}/status:
    patch:
      operationId: updateAdminUserStatus
      tags: [users]
      summary: Update a user's account status (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Invalid status
        "403":
          description: Forbidden
        "404":
          description: User not found

  /technicians:
    get:
      operationId: getTechnicians
      tags: [technicians]
      summary: Get all technicians (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin only
    post:
      operationId: createTechnician
      tags: [technicians]
      summary: Create a new technician account (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTechnicianRequest"
      responses:
        "201":
          description: Technician created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
        "400":
          description: Validation error or email already exists
        "403":
          description: Forbidden

  /technicians/{id}:
    patch:
      operationId: updateTechnician
      tags: [technicians]
      summary: Update technician info or deactivate (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTechnicianRequest"
      responses:
        "200":
          description: Technician updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Technician"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /bookings/{id}/technicians:
    put:
      operationId: assignBookingTechnicians
      tags: [bookings]
      summary: Assign multiple technicians to a booking (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTechniciansRequest"
      responses:
        "200":
          description: Technicians assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /complaints/{id}/technicians:
    put:
      operationId: assignComplaintTechnicians
      tags: [complaints]
      summary: Assign multiple technicians to a complaint (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTechniciansRequest"
      responses:
        "200":
          description: Technicians assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /site-visits/{id}/technicians:
    put:
      operationId: assignSiteVisitTechnicians
      tags: [site-visits]
      summary: Assign multiple technicians to a site visit (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTechniciansRequest"
      responses:
        "200":
          description: Technicians assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteVisit"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /chat/messages:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get current user's chat messages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a support message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/admin/conversations:
    get:
      operationId: getAdminConversations
      tags: [chat]
      summary: Get all customer conversations (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatConversation"

  /chat/admin/{userId}/messages:
    get:
      operationId: getAdminUserMessages
      tags: [chat]
      summary: Get messages for a specific user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  /quotes:
    get:
      operationId: getQuotes
      tags: [quotes]
      summary: Get quotes (own or all for admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
        "401":
          description: Unauthorized
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Submit a solar installation quotation request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Quote request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /quotes/{id}:
    get:
      operationId: getQuoteById
      tags: [quotes]
      summary: Get a quote by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "403":
          description: Forbidden
        "404":
          description: Not found
    patch:
      operationId: updateQuote
      tags: [quotes]
      summary: Respond to a quote (admin) or accept/reject (customer)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteRequest"
      responses:
        "200":
          description: Quote updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Invalid request
        "403":
          description: Forbidden
        "404":
          description: Not found

  /quotes/guest:
    post:
      operationId: createGuestQuote
      tags: [quotes]
      summary: Submit a solar installation quote request without an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Quote request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "400":
          description: Invalid request

  /warranties/search:
    get:
      operationId: searchWarrantyByInvoice
      tags: [warranties]
      summary: Search warranty by invoice number (public, no auth required)
      parameters:
        - name: invoiceNumber
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Warranty found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warranty"
        "404":
          description: Not found

  /warranties:
    get:
      operationId: getWarranties
      tags: [warranties]
      summary: Get warranties (own or filtered by userId for admin)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of warranties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warranty"
        "401":
          description: Unauthorized
    post:
      operationId: createWarranty
      tags: [warranties]
      summary: Add a warranty record for a customer (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarrantyRequest"
      responses:
        "201":
          description: Warranty created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warranty"
        "400":
          description: Validation error
        "403":
          description: Forbidden

  /warranties/{id}:
    patch:
      operationId: updateWarranty
      tags: [warranties]
      summary: Update a warranty record (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWarrantyRequest"
      responses:
        "200":
          description: Warranty updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warranty"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteWarranty
      tags: [warranties]
      summary: Delete a warranty record (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Warranty deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /chat/admin/{userId}/reply:
    post:
      operationId: sendAdminReply
      tags: [chat]
      summary: Send admin reply to a user
