components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 6
        referralCode:
          type: string
          description: Optional referral code from an existing user
      required:
        - name
        - email
        - phone
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    RegisterPendingResponse:
      type: object
      properties:
        message:
          type: string
        pending:
          type: boolean
      required:
        - message
        - pending

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        isAdmin:
          type: boolean
        isMaster:
          type: boolean
        inverterBrand:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        status:
          type: string
        role:
          type: string
          enum: [customer, technician]
        specialty:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - phone
        - isAdmin
        - isMaster
        - status
        - role
        - createdAt

    CustomerReport:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
            phone:
              type: string
            city:
              type: string
              nullable: true
            status:
              type: string
            role:
              type: string
            inverterBrand:
              type: string
              nullable: true
            referralCode:
              type: string
              nullable: true
            referralPoints:
              type: integer
            createdAt:
              type: string
              format: date-time
          required: [id, name, email, phone, status, role, referralPoints, createdAt]
        bookings:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              customerName:
                type: string
              status:
                type: string
              preferredDate:
                type: string
              city:
                type: string
              createdAt:
                type: string
                format: date-time
            required: [id, customerName, status, preferredDate, city, createdAt]
        complaints:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              subject:
                type: string
              status:
                type: string
              createdAt:
                type: string
                format: date-time
            required: [id, subject, status, createdAt]
        warranties:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              warrantyType:
                type: string
              brand:
                type: string
              model:
                type: string
                nullable: true
              purchaseDate:
                type: string
              durationMonths:
                type: integer
              expiryDate:
                type: string
              warrantyStatus:
                type: string
            required: [id, warrantyType, brand, purchaseDate, durationMonths, expiryDate, warrantyStatus]
        quotes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              systemType:
                type: string
              status:
                type: string
              createdAt:
                type: string
                format: date-time
            required: [id, systemType, status, createdAt]
        referralCount:
          type: integer
      required: [user, bookings, complaints, warranties, quotes, referralCount]

    AdminUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        isAdmin:
          type: boolean
        isMaster:
          type: boolean
        inverterBrand:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        role:
          type: string
        specialty:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - phone
        - isAdmin
        - isMaster
        - status
        - role
        - createdAt

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        city:
          type: string
          nullable: true
      required:
        - name
        - phone

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
      required:
        - currentPassword
        - newPassword

    AdminResetPasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
          minLength: 6
      required:
        - newPassword

    UpdateStatusRequest:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateBookingRequest:
      type: object
      properties:
        customerName:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        panelCount:
          type: integer
          minimum: 1
        panelType:
          type: string
          enum: [residential, commercial]
        preferredDate:
          type: string
        preferredTime:
          type: string
          enum: [morning, afternoon, evening]
        notes:
          type: string
      required:
        - customerName
        - phone
        - address
        - city
        - panelCount
        - panelType
        - preferredDate
        - preferredTime

    Booking:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        customerName:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        panelCount:
          type: integer
        panelType:
          type: string
          enum: [residential, commercial]
        preferredDate:
          type: string
        preferredTime:
          type: string
          enum: [morning, afternoon, evening]
        notes:
          type: string
        status:
          type: string
          enum: [pending, confirmed, in_progress, completed, cancelled]
        technicianId:
          type: string
          nullable: true
        technicianIds:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - customerName
        - phone
        - address
        - city
        - panelCount
        - panelType
        - preferredDate
        - preferredTime
        - status
        - technicianIds
        - createdAt

    BookingStats:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        confirmed:
          type: integer
        completed:
          type: integer
        thisMonth:
          type: integer
      required:
        - total
        - pending
        - confirmed
        - completed
        - thisMonth

    CreateComplaintRequest:
      type: object
      properties:
        subject:
          type: string
          enum: [Hybrid System, OnGrid System, Off-Grid System, Tubewell System]
        customerName:
          type: string
        phone:
          type: string
        address:
          type: string
        message:
          type: string
        bookingId:
